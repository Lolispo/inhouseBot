# Deploys the showcase site (site/) to inhousebot.petterbuilds.com on push to main.
#
# This repo is primarily the Discord bot and is PUBLIC. It now consumes the
# shared reusable deploy in Lolispo/ci (also PUBLIC, so public→public is allowed)
# instead of an inlined copy. The bot's dependency tree is never installed in CI:
# working-directory scopes install/build/npm-cache to site/, and dist-dir keeps
# its default (dist), resolving to site/dist.
#
# The role ARN is passed as a masked secret (AWS_DEPLOY_ROLE_ARN) so the account
# id stays out of this public repo's run logs; AWS access is gated by the OIDC
# role's trust policy (repo:Lolispo/*). Bucket + CloudFront distribution are read
# from SSM at deploy time inside the shared workflow.
#
# Only triggers on site/** (and this file) so bot-only commits don't deploy. The
# site build is self-contained: `vite build` reads the committed
# site/src/data/snapshot.json. The raw DB dump (site/data-src/) is gitignored PII
# and is NOT regenerated in CI.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read
    uses: Lolispo/ci/.github/workflows/deploy-app.yml@main
    with:
      app-id: inhousebot
      working-directory: site
    secrets:
      role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
