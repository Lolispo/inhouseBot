# Deploys the showcase site (site/) to inhousebot.petterbuilds.com on push to main.
#
# This repo is primarily the Discord bot and is PUBLIC, so it can't consume the
# private shared workflow in Lolispo/web-platform (a public repo can't use a
# private reusable workflow). We therefore inline a minimal deploy here instead.
#
# Kept deliberately lean vs the shared workflow: it installs/builds ONLY in site/
# (the bot's dependency tree is never installed in CI), and hardcodes the two
# values we actually use. Bucket + CloudFront distribution are still read from SSM
# at deploy time so no infra ids live in this public repo. Auth is OIDC into the
# platform's shared deploy role (its trust policy allows repo:Lolispo/*).
#
# Only triggers on site/** (and this file) so bot-only commits don't deploy.
# The site build is self-contained: `vite build` reads the committed
# site/src/data/snapshot.json. The raw DB dump (site/data-src/) is gitignored PII
# and is NOT regenerated in CI.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::873163838676:role/petterbuilds-deploy
          aws-region: eu-north-1

      - name: Inject RUM analytics snippet
        run: |
          set -euo pipefail
          ssm() { aws ssm get-parameter --name "$1" --query Parameter.Value --output text; }
          APP_ID=$(ssm /platform/rum/app-monitor-id)
          POOL_ID=$(ssm /platform/rum/identity-pool-id)
          ROLE_ARN=$(ssm /platform/rum/guest-role-arn)
          RUM_REGION=$(ssm /platform/rum/region)
          START='<!-- petterbuilds-rum:start -->'
          END='<!-- petterbuilds-rum:end -->'
          BLOCK="$START
          <script>
          (function(n,i,v,r,s,c,u,x,z){x=window.AwsRumClient={q:[],n:n,i:i,v:v,r:r,c:c,u:u};window[n]=function(c,p){x.q.push({c:c,p:p});};z=document.createElement('script');z.async=true;z.src=s;document.head.insertBefore(z,document.getElementsByTagName('script')[0]);})('cwr','$APP_ID','1.0.0','$RUM_REGION','https://client.rum.us-east-1.amazonaws.com/3.x/cwr.js',{sessionSampleRate:1,guestRoleArn:'$ROLE_ARN',identityPoolId:'$POOL_ID',endpoint:'https://dataplane.rum.$RUM_REGION.amazonaws.com',telemetries:['errors','performance'],allowCookies:false,enableXRay:false});
          </script>
          $END"
          # awk reads BLOCK from the environment (ENVIRON["BLOCK"]) so a multi-line
          # value doesn't error as "newline in string".
          find dist -type f -name '*.html' | while read -r f; do
            BLOCK="$BLOCK" awk 'BEGIN{skip=0;done=0}/petterbuilds-rum:start/{skip=1;next}/petterbuilds-rum:end/{skip=0;next}skip{next}{lines[NR]=$0}END{for(i=1;i<=NR;i++){l=lines[i];if(!done&&(l ~ /<\/head>/||l ~ /<\/body>/)){print ENVIRON["BLOCK"];done=1}print l}if(!done)print ENVIRON["BLOCK"]}' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Sync to S3 and invalidate CloudFront
        run: |
          set -euo pipefail
          BUCKET=$(aws ssm get-parameter --name /platform/apps-bucket --query Parameter.Value --output text)
          DIST=$(aws ssm get-parameter --name /platform/distribution-id --query Parameter.Value --output text)
          aws s3 sync dist "s3://$BUCKET/inhousebot/" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/inhousebot/*"
