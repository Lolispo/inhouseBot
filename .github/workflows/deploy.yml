# Deploys the showcase site (site/) to inhousebot.petterbuilds.com on push to main.
#
# This repo is primarily the Discord bot and is PUBLIC, so it can't consume the
# private shared workflow in Lolispo/web-platform (a public repo can't use a
# private reusable workflow). We therefore inline a minimal deploy here instead.
#
# Kept deliberately lean vs the shared workflow: it installs/builds ONLY in site/
# (the bot's dependency tree is never installed in CI), and hardcodes the two
# values we actually use. Bucket + CloudFront distribution are still read from SSM
# at deploy time so no infra ids live in this public repo. Auth is OIDC into the
# platform's shared deploy role (its trust policy allows repo:Lolispo/*).
#
# Only triggers on site/** (and this file) so bot-only commits don't deploy.
# The site build is self-contained: `vite build` reads the committed
# site/src/data/snapshot.json. The raw DB dump (site/data-src/) is gitignored PII
# and is NOT regenerated in CI.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::873163838676:role/petterbuilds-deploy
          aws-region: eu-north-1

      - name: Sync to S3 and invalidate CloudFront
        run: |
          set -euo pipefail
          BUCKET=$(aws ssm get-parameter --name /platform/apps-bucket --query Parameter.Value --output text)
          DIST=$(aws ssm get-parameter --name /platform/distribution-id --query Parameter.Value --output text)
          aws s3 sync dist "s3://$BUCKET/inhousebot/" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/inhousebot/*"
